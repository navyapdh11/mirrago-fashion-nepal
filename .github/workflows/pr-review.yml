name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  auto-review:
    name: Automated PR Review
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, json, bcmath

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Run frontend type check
        run: cd frontend && npx tsc --noEmit 2>/dev/null || echo "Type check skipped"

      - name: Run frontend build check
        run: cd frontend && npm run build

      - name: PHP syntax check
        run: |
          ERRORS=$(find app/ -name "*.php" -exec php -l {} \; | grep -v "No syntax errors" || true)
          if [ -n "$ERRORS" ]; then echo "$ERRORS"; exit 1; fi
          echo "✓ All PHP files passed"

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
            });

            const passed = checks.data.check_runs.filter(c => c.conclusion === 'success').length;
            const failed = checks.data.check_runs.filter(c => c.conclusion === 'failure').length;
            const pending = checks.data.check_runs.filter(c => c.status === 'in_progress' || c.status === 'queued').length;

            const body = `## 🤖 Automated Review

            | Check | Result |
            |-------|--------|
            | Frontend Build | ${passed > 0 ? '✅' : '⏳'} |
            | Backend PHP | ${passed > 0 ? '✅' : '⏳'} |
            | **Passed** | ${passed} |
            | **Failed** | ${failed} |
            | **Pending** | ${pending} |

            ${failed > 0 ? '⚠️ Some checks failed. Please review the logs above.' : '✅ All checks passed!'}
            `;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
